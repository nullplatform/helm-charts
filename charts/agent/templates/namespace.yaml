{{- if .Values.createNamespace }}
{{- if not (lookup "v1" "Namespace" "" .Values.namespace) }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.namespace }}
  labels:
    name: {{ .Values.namespace }}
  annotations:
    openshift.io/cluster-monitoring: "true"
    helm.sh/resource-policy: keep
{{- end }}
{{- end }}
