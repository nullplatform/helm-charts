# Global settings
global:
  # Kubernetes provider (options: "eks", "gke", "aks", "aro", "oke", "k3s")
  provider: "eks"
  # AWS region (applicable for EKS provider)
  awsRegion: "us-east-1"
# Namespace configurations
namespaces:
  # Namespace for Null platform resources
  nullplatformApplications: "nullplatform"
  nullplatformTools: "nullplatform-tools"
# Nullplatform configurations
nullplatform:
  apiKey: ""
  secretName: ""  # If provided will mount it from an existing secret
# Logging configurations
controlPlane:
  enabled: false
  agent:
    image: "public.ecr.aws/nullplatform/controlplane-agent:latest"
    resources:
      requests:
        cpu: 50m
        memory: 100Mi
      limits:
        cpu: 100m
        memory: 150Mi
logging:
  enabled: true
  # Tolerations allow the DaemonSet to run on nodes with taints
  # Example:
  # tolerations:
  #   - operator: "Exists"
  #   - key: "node-role.kubernetes.io/master"
  #     operator: "Exists"
  #     effect: "NoSchedule"
  tolerations: []
  ensureLease: false
  applicationLogs:
    # Set to false to disable all application log forwarding across every provider.
    # Only the metrics pipeline (http aggregation, system metrics) will remain active.
    enabled: true
  mountDockerContainers: false  # set to true when using Docker container runtime (e.g. Minikube)
  streams:
    enabled: false
    mountPath: "/etc/null-logs/streams-dd.conf"
    subPath: "streams-dd.conf"
  streamsConfigMapName: "streams-dd-config"
  controller:
    image: "public.ecr.aws/nullplatform/k8s-logs-controller:1.4.0"
    resources:
      requests:
        cpu: 100m
        memory: 200Mi
      limits:
        cpu: 700m
        memory: 300Mi
  prometheus:
    enabled: false
    exporterPort: 2021
  gelf:
    enabled: false
    host: ""
    port: ""
  loki:
    enabled: false
    host: ""
    port: ""
    user: ""
    password: ""
    bearerToken: ""
    matchRegex: "container.*.application"
  dynatrace:
    enabled: false
    logsEnabled: true    # set to false to send only metrics (DYNATRACE_PERFORMANCE_METRICS_ENABLED)
    metricsEnabled: true  # set to false to send only logs
    apiKey: ""
    environmentId: ""
  datadog:
    enabled: false
    logsEnabled: true    # set to false to send only metrics (DATADOG_PERFORMANCE_METRICS_ENABLED)
    metricsEnabled: true  # set to false to send only logs
    apiKey: ""
    region: ""
  newrelic:
    enabled: false
    logsEnabled: true    # set to false to send only metrics (NEWRELIC_PERFORMANCE_METRICS_ENABLED)
    metricsEnabled: true  # set to false to send only logs
    licenseKey: ""
    region: ""
# CloudWatch configuration
cloudwatch:
  enabled: false
  region: us-east-1
  retentionDays: 7
  logs:
    enabled: true
  performanceMetrics:
    enabled: true
  customMetrics:
    enabled: true
  accessLogs:
    enabled: false
# Metrics server configuration
metricsServer:
  enabled: true
# Image pull secret configuration
imagePullSecrets:
  enabled: false
  name: image-pull-secret-nullplatform
  registry: ""
  username: ""
  password: ""
customConf:
  enabled: false
  configMapName: ""
