{{- if .Values.private.enabled }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-internal
  # ClusterIssuer es un recurso global, no lleva namespace, pero no rompe nada si lo dejas.
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: it@nullplatform.io
    privateKeySecretRef:
      name: letsencrypt-internal
    solvers:
      - selector:
          dnsZones:
            - "{{ .Values.private.domainName }}"
        dns01:
         {{- if eq .Values.cloudProvider "gcp" }}
          cloudDNS:
            project: "{{ .Values.gcp.projectId }}"
          {{- else if eq .Values.cloudProvider "azure" }}
          azureDNS:
            subscriptionID: {{ .Values.azure.subscriptionID }}
            resourceGroupName: {{ .Values.azure.resourceGroupName }}
            hostedZoneName: {{ .Values.azure.hostedZoneName }}
            environment: AzurePublicCloud
            {{- if .Values.azure.useWorkloadIdentity }}
            managedIdentity:
              clientID: {{ required "azure.clientID is required" .Values.azure.clientID | quote }}
            {{- else }}
            tenantID: {{ required "azure.tenantID is required" .Values.azure.tenantID | quote }}
            clientID: {{ required "azure.clientID is required" .Values.azure.clientID | quote }}
            clientSecretSecretRef:
              name: {{ required "azure.clientSecret.secretName is required" .Values.azure.clientSecret.secretName | quote }}
              key: {{ .Values.azure.clientSecret.secretKey | default "client-secret" | quote }}
            {{- end }}
          {{- else if eq .Values.cloudProvider "cloudflare" }}
          cloudflare:
            apiTokenSecretRef:
              name: {{ .Values.cloudflare.secretName | default "cloudflare-api-token-secret" }}
              key: api-token
          {{- else if eq .Values.cloudProvider "aws" }}
          route53:
            region: {{ .Values.route53.region }}
          {{- else if eq .Values.cloudProvider "oci" }}
          webhook:
            groupName: acme.d-n.be
            solverName: oci
            config:
              ociWorkloadIdentityEnabled: true
              ociRegion: {{ .Values.oci.region }}
              ociCompartmentOCID: {{ .Values.oci.compartmentOCID }}
          {{- end }}
          

{{- end }}
